<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lesson 3 Exercises</title>
</head>
<body>

    <div class="js-container"></div>
    <script src="https://unpkg.com/supersimpledev/dayjs.js"></script>
    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

   

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">

				function Counter({ countClick , setCountClick}){
					
						function clickButton(){
							setCountClick(countClick + 1);

						}
							return (
                <>
									{countClick === 1 ? <button onClick={clickButton}>Clicked {countClick} time</button>:<button onClick={clickButton}>Clicked {countClick} times</button>}
									
                </>
            )
				}

				function Reset({ countClick , setCountClick }){
					function resetCount(){
						countClick = 0;
						setCountClick(countClick);
					}

					return (
						<button onClick={resetCount}>RESET</button>
					);
				}

        function App(){
					const [countClick , setCountClick ] = React.useState(0);

					return(
						<>
							<Counter 
								countClick={countClick}
								setCountClick={setCountClick}
							/>
							<Counter 
								countClick={countClick}
								setCountClick={setCountClick}
							/>
							<Reset
								countClick={countClick}
								setCountClick={setCountClick}
							/>
						</>
					);
        }



        const container = document.querySelector('.js-container');
        ReactDOM.createRoot(container).render(<App/>);
    </script>
</body>
</html>
